<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List properties</title>
    <style>
        ol {
            background: #aaff99;
            padding: 20px;
            margin-right: 1000px;
        }
        ul {
            background: turquoise;
            padding: 15px;
            margin-right: 1000px;
        }
        ol li {
            background: rgba(51, 138, 119, 0.103);
            margin: 5px;
        }
        ul li {
            background: rgb(152, 235, 228);
            margin: 5px;
        }
    </style>
</head>
<body>
    <ul>
        <li>iPhone</li>
        <li>Samsung</li>
        <li>Pixel</li>
        <li>One Plus</li>
    </ul>
    <ol>
        <li>MacBook</li>
        <li>MSI</li>
        <li>Dell</li>
        <li>Asus</li>
    </ol>
</body>
</html>
