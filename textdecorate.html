<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove underline</title>
    <style>
        #removeul{
            text-decoration: none;
        }
    </style>
</head>
<body>
    
    <h2>With underline</h2>
    <a href="http://www.google.com">Google's link</a>
    <h2>Without underline</h2>
    <a id="removeul" href="http://www.google.com">Google's link</a>
</body>
</html>
